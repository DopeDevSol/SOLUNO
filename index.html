<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLUNO - SOLANA EDITION</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
      text-transform: uppercase;
    }
    .font-bungee {
      font-family: 'Bungee', cursive;
    }
    
    /* Green Felt Table Styling */
    .felt-table {
      background: radial-gradient(circle at center, #1a4d1a 0%, #0d2b0d 100%);
      position: relative;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
    }
    .felt-table::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('https://www.transparenttextures.com/patterns/felt.png');
      opacity: 0.15;
      pointer-events: none;
    }

    /* Solana Logo watermark on table */
    .solana-watermark {
      position: absolute;
      width: 30vw;
      height: 30vw;
      opacity: 0.05;
      pointer-events: none;
      filter: grayscale(1);
    }

    /* Disco Lights Animation */
    @keyframes disco {
      0% { transform: translate(-10%, -10%) scale(1); opacity: 0.3; }
      50% { transform: translate(10%, 10%) scale(1.2); opacity: 0.6; }
      100% { transform: translate(-10%, -10%) scale(1); opacity: 0.3; }
    }
    .disco-bg {
      position: fixed;
      inset: -50px;
      z-index: 0;
      pointer-events: none;
      filter: blur(80px);
      opacity: 0.4;
    }
    .disco-light {
      position: absolute;
      width: 40vw;
      height: 40vw;
      border-radius: 50%;
      animation: disco 8s infinite alternate ease-in-out;
    }

    /* Rotating Neon Circle - Solana Theme */
    @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    
    .neon-circle-container {
      position: absolute;
      width: 140%;
      height: 140%;
      pointer-events: none;
      z-index: 1;
    }
    .neon-circle {
      width: 100%;
      height: 100%;
      border: 6px dashed;
      border-image: linear-gradient(to right, #9945FF, #14F195) 1;
      border-radius: 50%;
      box-shadow: 0 0 30px #9945FF, inset 0 0 30px #14F195;
      opacity: 0.4;
    }
    .animate-cw { animation: rotate-cw 15s linear infinite; }
    .animate-ccw { animation: rotate-ccw 15s linear infinite; }

    /* Floating Money Animation */
    @keyframes float-money {
      0%, 100% { transform: translateY(0) scale(1) rotate(0deg); filter: drop-shadow(0 0 10px #22c55e); }
      50% { transform: translateY(-10px) scale(1.2) rotate(10deg); filter: drop-shadow(0 0 25px #22c55e); }
    }
    .animate-float-money {
      display: inline-block;
      animation: float-money 1.5s ease-in-out infinite;
    }

    /* +4 Card Impact Animation */
    @keyframes draw4-impact {
      0% { transform: scale(1); filter: hue-rotate(0deg) brightness(1); }
      50% { transform: scale(1.3); filter: hue-rotate(180deg) brightness(2); box-shadow: 0 0 50px #fff; }
      100% { transform: scale(1); filter: hue-rotate(360deg) brightness(1); }
    }
    .animate-draw4-impact { animation: draw4-impact 1s ease-in-out; }

    @keyframes card-shuffle-main {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-30px, -5px) rotate(-8deg); z-index: 10; }
      50% { transform: translate(0, 0) rotate(0deg); z-index: 5; }
      75% { transform: translate(30px, 5px) rotate(8deg); z-index: 10; }
    }
    
    .shuffle-anim-1 { animation: card-shuffle-main 0.4s ease-in-out infinite; }

    @keyframes deal-card-cool {
      0% { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 0; }
      20% { opacity: 1; scale: 1.2; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.6) rotate(360deg); opacity: 0; }
    }
    
    .dealing-card-anim {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 100;
      pointer-events: none;
      animation: deal-card-cool 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes skip-flash {
      0% { transform: scale(1); filter: brightness(1); }
      15% { transform: scale(1.4); filter: brightness(4) contrast(2); z-index: 100; }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .animate-skip-impact { animation: skip-flash 0.6s ease-out; }

    @keyframes reverse-spin {
      0% { transform: rotateY(0deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.3); filter: brightness(1.5); }
      100% { transform: rotateY(360deg) scale(1); }
    }
    .animate-reverse-impact { animation: reverse-spin 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    /* Confetti Animation */
    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      z-index: 150;
      pointer-events: none;
      animation: confetti-fall 4s linear forwards;
    }

    @keyframes prize-pop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-prize-pop { animation: prize-pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    .soluno-bg {
      background-color: #000;
      overflow: hidden;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
<body class="soluno-bg">
  <div class="disco-bg">
    <div class="disco-light" style="top: 10%; left: 10%; background: #ed1c24;"></div>
    <div class="disco-light" style="top: 60%; left: 70%; background: #0054a6; animation-delay: -2s;"></div>
    <div class="disco-light" style="top: 20%; left: 80%; background: #39b54a; animation-delay: -4s;"></div>
    <div class="disco-light" style="top: 70%; left: 10%; background: #fcee21; animation-delay: -6s;"></div>
  </div>
  <div id="root"></div>
</body>
</html>
