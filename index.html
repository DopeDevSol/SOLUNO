
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SOLUNO - Solana Mobile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      text-transform: uppercase;
      overscroll-behavior: contain;
      perspective: 1200px;
    }
    .font-bungee {
      font-family: 'Bungee', cursive;
    }
    
    /* High-Quality Felt Table */
    .felt-table {
      background: radial-gradient(circle at center, #1b4d2a 0%, #0a2412 70%, #051209 100%);
      position: relative;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
      min-height: 100vh;
    }
    .felt-table::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('https://www.transparenttextures.com/patterns/felt.png');
      opacity: 0.12;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    /* 3D Flying Card Styles */
    .flying-card {
      position: absolute;
      width: 100px;
      height: 150px;
      pointer-events: none;
      z-index: 5;
      will-change: transform, opacity;
      transition: transform 0.1s linear;
    }

    @keyframes card-deal-in {
      0% { transform: translate(-50%, -50%) scale(0) rotate(720deg); opacity: 0; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--tr)); opacity: 1; }
    }

    .scroll-deal {
      opacity: 0;
      transform: translateY(150px) rotateX(60deg) scale(0.5);
      transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .scroll-deal.active {
      opacity: 1;
      transform: translateY(0) rotateX(0deg) scale(1);
    }

    /* Direction Indicator Rings */
    .direction-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 45vh;
      height: 45vh;
      border: 2px dashed rgba(20, 241, 149, 0.1);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes rotate-cw { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes rotate-ccw { from { transform: translate(-50%, -50%) rotate(360deg); } to { transform: translate(-50%, -50%) rotate(0deg); } }

    .spin-cw { animation: rotate-cw 20s linear infinite; }
    .spin-ccw { animation: rotate-ccw 20s linear infinite; }

    /* Woven Watermark */
    .table-watermark-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 30vh;
      height: 30vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }

    .watermark-text {
      font-family: 'Bungee';
      font-size: 3vh;
      color: white;
      opacity: 0.03;
      font-style: italic;
      letter-spacing: 0.2em;
    }

    /* Enhanced Confetti Animation */
    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
      25% { transform: translateY(25vh) translateX(15px) rotate(90deg); }
      50% { transform: translateY(50vh) translateX(-15px) rotate(180deg); }
      75% { transform: translateY(75vh) translateX(15px) rotate(270deg); }
      100% { transform: translateY(110vh) translateX(0) rotate(360deg); opacity: 0; }
    }
    
    @keyframes confetti-wobble {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(0.5); }
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      animation: confetti-fall linear infinite;
      z-index: 301;
      will-change: transform;
    }

    .confetti-inner {
      width: 100%;
      height: 100%;
      animation: confetti-wobble 0.5s ease-in-out infinite;
    }

    /* Victory Screen Polish */
    @keyframes golden-glow {
      0%, 100% { filter: drop-shadow(0 0 20px #fcee21); transform: scale(1) rotate(0deg); }
      50% { filter: drop-shadow(0 0 50px #14F195); transform: scale(1.1) rotate(5deg); }
    }
    .winner-cup-animation {
      animation: golden-glow 2s ease-in-out infinite;
    }

    /* Rotation Overlay */
    #rotation-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    @media (orientation: portrait) {
      #rotation-overlay {
        display: flex;
      }
    }

    /* Draw 4 Impact Animation */
    @keyframes draw4-impact {
      0% { transform: scale(1) rotate(0deg); filter: hue-rotate(0deg) brightness(1); }
      25% { transform: scale(1.6) rotate(15deg); filter: hue-rotate(90deg) brightness(2); box-shadow: 0 0 80px #fff; }
      50% { transform: scale(1.4) rotate(-15deg); filter: hue-rotate(180deg) brightness(1.5); }
      100% { transform: scale(1) rotate(0deg); filter: hue-rotate(360deg) brightness(1); }
    }
    .animate-draw4-impact {
      animation: draw4-impact 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Card Dealing Animation */
    @keyframes deal-card {
      0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(360deg); opacity: 0; }
    }
    .dealing-card-anim {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 100;
      pointer-events: none;
      animation: deal-card 0.5s ease-out forwards;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .mask-fade-edges {
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }

    .hand-tray-bg {
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
      backdrop-filter: blur(12px);
    }

    @keyframes float-hero-card {
      0%, 100% { transform: translateY(0) rotate(var(--rot)); }
      50% { transform: translateY(-30px) rotate(calc(var(--rot) + 5deg)); }
    }
    .hero-card {
      animation: float-hero-card 6s ease-in-out infinite;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .text-shadow-glow {
      text-shadow: 0 0 20px rgba(153, 69, 255, 0.5), 0 0 40px rgba(20, 241, 149, 0.3);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
<body>
  <div id="rotation-overlay">
    <div class="w-16 h-16 mb-4 animate-bounce text-4xl">🔄</div>
    <h2 class="text-xl font-black italic mb-1">LANDSCAPE MODE</h2>
    <p class="text-white/30 text-[10px] tracking-widest uppercase">Rotate device to join the table</p>
  </div>
  <div id="root"></div>
</body>
</html>
